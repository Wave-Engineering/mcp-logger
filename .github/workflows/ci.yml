name: CI

on:
  push:
    # These must match the branch prefixes the workflow gate enforces —
    # (feature|fix|chore|doc|bug|kahuna)/NNN-description, all SINGULAR. This
    # list previously read "docs/*", a prefix the convention rejects, so it
    # matched nothing while `doc/`, `bug/` and `kahuna/` branches pushed with no
    # CI run at all. PRs into main were still checked, so nothing shipped
    # unverified — but "no run" and "green run" look identical in a branch list.
    branches:
      ["main", "feature/*", "fix/*", "chore/*", "doc/*", "bug/*", "kahuna/*"]
  merge_group:
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: sudo apt-get install -y shellcheck
      - run: bun install
      - run: scripts/ci/lint.sh
      # Runs here as well as in release.yml so a change to the `files` allowlist
      # is caught on the PR that makes it, rather than at the next release.
      # npm is preinstalled on ubuntu-latest; --require makes its absence fatal
      # instead of a silent skip.
      - run: scripts/ci/verify-tarball.sh --require

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: scripts/ci/test.sh
